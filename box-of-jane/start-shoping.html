<!doctype html>
<html>

  <head>
    <meta charset="utf-8">
    <title>Start Shoping</title>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#fff">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" media="all" href="css/app.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700" rel="stylesheet"> </head>

  <body>
    <div class="page ">
      <header class="header  header_mod-mobile ">
        <div class="header__in">
          <div class="header__logo"> <a href="#" class="logo">
        <img src="img/logo.svg" width="185" height="45" alt="">
      </a> </div>
        </div>
      </header>
      <div class="steps">
        <div class="steps__step  is-approved"> <span>Verify Your Number</span> <svg class="icon icon-arr"><use xlink:href="img/sprite.svg#icon-arr"></use></svg> </div>
        <div class="steps__step  is-approved"> <span>Provide I.D.</span> <svg class="icon icon-arr"><use xlink:href="img/sprite.svg#icon-arr"></use></svg> </div>
        <div class="steps__step  is-approved"> <span>Provide Medical Card</span> <svg class="icon icon-arr"><use xlink:href="img/sprite.svg#icon-arr"></use></svg> </div>
        <div class="steps__step is-active"> <span>Start Shopping!</span> </div>
      </div>
      <!-- BEGIN content -->
      <div class="out">
        <div class="start-shoping">
          <div class="start-shoping__title">Hold tight!</div>
          <div class="start-shoping__img"><img src="img/box-all.png" alt=""></div>
          <div class="start-shoping__descr"> We need a few minutes to verify your documents. In the meantime, take our brief survey, so our curation team can match products to you based on your preferences or start adding items to your cart! </div>
          <div class="start-shoping__btns"> <button class="start-shoping__btn btn btn_purple btn_muchbigger">TAKE SURVEY</button> <button class="start-shoping__btn btn btn_purple-border-big btn_muchbigger">START SHOPPING</button> </div>
        </div>
      </div>
      <!-- END content -->
    </div>
    <!-- BEGIN scripts -->
    <script type="text/javascript" src="js/app.js"></script>
    <!-- END scripts -->
  </body>

</html>
