<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Portfolio</title>
	<link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
	<style>

		* {
			margin: 0;
			padding: 0;
		}
		html, body, .page {
			overflow: auto;
			height: 100%;
		}
		body {
			font-family: "Roboto", sans-serif;
			line-height: 1.6;
		}
		.page {
			background: -moz-radial-gradient(center, #ccc, #333);
			background: -o-radial-gradient(center, #ccc, #333);
			background: -webkit-radial-gradient(center, #ccc, #333);
			background: radial-gradient(center, #ccc, #333);
		}
		h1 {
			font-size: 46px;
			text-align: center;
			margin: 15px 0;
			color: #111;
		}
		.link {
			float: left;
			height: 100px;
			width: 25%;
			text-align: center;
		}
		.link a {
			display: block;
			width: 100%;
			font-size: 22px;
			height: 65px;
			padding-top: 35px;
			text-decoration: none;
			color: #222;
		}
		.link:hover {
			background: #ccc;
		}		
		@media only screen and (max-width:1200px) {
			.link {
				width: 25%;
			}
		}
		@media only screen and (max-width:992px) {
			.link {
				width: 33.3333%;
			}
		}
		@media only screen and (max-width:768px) {
			.link {
				width: 50%;
			}			
		}
		@media only screen and (max-width:480px) {				
			.link {
				width: 100%;
			}
		}
	</style>
</head>
