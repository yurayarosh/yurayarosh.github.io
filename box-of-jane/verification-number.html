<!doctype html>
<html>

  <head>
    <meta charset="utf-8">
    <title>Number Verification</title>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#fff">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" media="all" href="css/app.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700" rel="stylesheet"> </head>

  <body>
    <div class="page ">
      <header class="header  header_mod-mobile ">
        <div class="header__in">
          <div class="header__logo"> <a href="#" class="logo">
        <img src="img/logo.svg" width="185" height="45" alt="">
      </a> </div>
        </div>
      </header>
      <div class="steps">
        <div class="steps__step is-active "> <span>Verify Your Number</span> <svg class="icon icon-arr"><use xlink:href="img/sprite.svg#icon-arr"></use></svg> </div>
        <div class="steps__step  "> <span>Provide I.D.</span> <svg class="icon icon-arr"><use xlink:href="img/sprite.svg#icon-arr"></use></svg> </div>
        <div class="steps__step  "> <span>Provide Medical Card</span> <svg class="icon icon-arr"><use xlink:href="img/sprite.svg#icon-arr"></use></svg> </div>
        <div class="steps__step "> <span>Start Shopping!</span> </div>
      </div>
      <!-- BEGIN content -->
      <div class="out">
        <div class="verify-num">
          <div class="verify-num__title">Provide us with your mobile number.</div>
          <div class="verify-num__img"><img src="img/iphone.png" alt=""></div>
          <div class="verify-num__descr"> Enter your mobile number to receive a verification link </div>
          <div class="verify-num__field"> <span>MOBILE NUMBER</span> <input type="text"> </div>
          <div class="verify-num__btn"> <button class="btn btn_purple btn_muchbigger">SEND VERIFICATION LINK</button> </div>
        </div>
      </div>
      <!-- END content -->
    </div>
    <!-- BEGIN scripts -->
    <script type="text/javascript" src="js/app.js"></script>
    <!-- END scripts -->
  </body>

</html>
