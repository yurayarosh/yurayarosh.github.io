<!doctype html>
<html>

  <head>
    <meta charset="utf-8">
    <title>Provide Med Card</title>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#fff">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" media="all" href="css/app.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700" rel="stylesheet"> </head>

  <body>
    <div class="page ">
      <header class="header  header_mod-mobile ">
        <div class="header__in">
          <div class="header__logo"> <a href="#" class="logo">
        <img src="img/logo.svg" width="185" height="45" alt="">
      </a> </div>
        </div>
      </header>
      <div class="steps">
        <div class="steps__step  is-approved"> <span>Verify Your Number</span> <svg class="icon icon-arr"><use xlink:href="img/sprite.svg#icon-arr"></use></svg> </div>
        <div class="steps__step  is-approved"> <span>Provide I.D.</span> <svg class="icon icon-arr"><use xlink:href="img/sprite.svg#icon-arr"></use></svg> </div>
        <div class="steps__step is-active "> <span>Provide Medical Card</span> <svg class="icon icon-arr"><use xlink:href="img/sprite.svg#icon-arr"></use></svg> </div>
        <div class="steps__step "> <span>Start Shopping!</span> </div>
      </div>
      <!-- BEGIN content -->
      <div class="out">
        <div class="provide-med-card">
          <div class="provide-med-card__title">Do you have a medical marijuana card?</div>
          <div class="provide-med-card__img"><img src="img/brain-health.png" alt=""></div>
          <div class="provide-med-card__descr"> To comply with state law, please provide a valid medical marijuana recommendation letter or I.D. card. </div>
          <div class="provide-med-card__btns">
            <div class="provide-med-card__btn"> <button class="btn btn_purple btn_muchbigger">UPLOAD RECOMMENDATION</button> </div>
            <div class="provide-med-card__btn"> <button class="btn btn_big btn_purple-border-big btn_muchbigger">I DON’T HAVE A RECOMMENDATION</button> </div>
          </div>
        </div>
      </div>
      <!-- END content -->
    </div>
    <!-- BEGIN scripts -->
    <script type="text/javascript" src="js/app.js"></script>
    <!-- END scripts -->
  </body>

</html>
