<!doctype html>
<html>

  <head>
    <meta charset="utf-8">
    <title>Provide ID</title>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#fff">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" media="all" href="css/app.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700" rel="stylesheet"> </head>

  <body>
    <div class="page ">
      <header class="header  header_mod-mobile ">
        <div class="header__in">
          <div class="header__logo"> <a href="#" class="logo">
        <img src="img/logo.svg" width="185" height="45" alt="">
      </a> </div>
        </div>
      </header>
      <div class="steps">
        <div class="steps__step  is-approved"> <span>Verify Your Number</span> <svg class="icon icon-arr"><use xlink:href="img/sprite.svg#icon-arr"></use></svg> </div>
        <div class="steps__step is-active "> <span>Provide I.D.</span> <svg class="icon icon-arr"><use xlink:href="img/sprite.svg#icon-arr"></use></svg> </div>
        <div class="steps__step  "> <span>Provide Medical Card</span> <svg class="icon icon-arr"><use xlink:href="img/sprite.svg#icon-arr"></use></svg> </div>
        <div class="steps__step "> <span>Start Shopping!</span> </div>
      </div>
      <!-- BEGIN content -->
      <div class="out">
        <div class="provide">
          <div class="provide__title">Almost there!</div>
          <div class="provide__img"><img src="img/delivery.svg" alt=""></div>
          <div class="provide__descr">
            <p>We need to verify who you are. Please send us a photo of your state-issued I.D.</p>
            <p>Valid I.D.’s include: Driver’s License, U.S. Passport, or a state-issued photo I.D.</p>
          </div>
          <div class="provide__btn"> <button class="btn btn_purple btn_muchbigger">ADD IDENTIFICATION</button> </div>
        </div>
      </div>
      <!-- END content -->
    </div>
    <!-- BEGIN scripts -->
    <script type="text/javascript" src="js/app.js"></script>
    <!-- END scripts -->
  </body>

</html>
