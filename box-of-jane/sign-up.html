<!doctype html>
<html>

  <head>
    <meta charset="utf-8">
    <title>Sign Up</title>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#fff">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" media="all" href="css/app.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700" rel="stylesheet"> </head>

  <body>
    <div class="page ">
      <header class="header  header_mod-mobile ">
        <div class="header__in">
          <div class="header__logo"> <a href="#" class="logo">
        <img src="img/logo.svg" width="185" height="45" alt="">
      </a> </div>
        </div>
      </header>
      <!-- BEGIN content -->
      <div class="out">
        <div class="inner">
          <div class="form-login">
            <div class="form-title">Sign up with Box of Jane!</div>
            <div class="form-info">Please enter your personal information to sign up.</div>
            <div class="form-inner">
              <div class="form-inputs">
                <div class="form-row">
                  <div class="form-col"> <label class="input">
              <div class="input__label">First Name</div>
              <input type="text"
                class="input__main" placeholder="First Name">
            </label> </div>
                  <div class="form-col"> <label class="input">
              <div class="input__label">Last Name</div>
              <input type="text"
                class="input__main" placeholder="Last Name">
            </label> </div>
                </div>
                <div class="form-row">
                  <div class="form-col"> <label class="input">
              <div class="input__label">EMAIL</div>
              <input type="text"
                class="input__main" placeholder="EMAIL">
            </label> </div>
                </div>
                <div class="form-row">
                  <div class="form-col"> <label class="input">
              <div class="input__label">PASSWORD</div>
              <input type="text"
                class="input__main" placeholder="PASSWORD">
            </label> </div>
                </div>
                <div class="form-row">
                  <div class="form-col"> <label class="input">
              <div class="input__label">CONFIRM PASSWORD</div>
              <input type="text"
                class="input__main" placeholder="CONFIRM PASSWORD">
            </label> </div>
                </div>
                <div class="form-row">
                  <div class="form-col"> <label class="input">
              <div class="input__label">ZIP CODE</div>
              <input type="text"
                class="input__main" placeholder="ZIP CODE">
            </label> </div>
                </div>
              </div>
              <div class="form-row form-row_space">
                <div class="form-col">
                  <div class="checkbox checkbox_mod"> <input type="checkbox" id="checkbox"> <label for="checkbox">I agree to Box of Jane’s
              <a href="#">Terms of Service</a> and
              <a href="#">Privacy Policy</a>.</label> </div>
                </div>
              </div>
              <div class="form-row">
                <div class="form-col">
                  <div class="captcha"> <img src="img/captcha.png" alt="Captcha"> </div>
                </div>
              </div>
              <div class="form-btns">
                <div class="form-row">
                  <div class="form-col"> <button type="button" class="btn btn_purple btn_big-reg btn_not-upper">Create Account</button> </div>
                </div>
                <div class="form-divider"> <span>or</span> </div>
                <div class="form-row">
                  <div class="form-col"> <button type="button" class="btn btn_big btn_purple-border">SIGN IN</button> </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- END content -->
    </div>
    <!-- BEGIN scripts -->
    <script type="text/javascript" src="js/app.js"></script>
    <!-- END scripts -->
  </body>

</html>
